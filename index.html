<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>데이트 신청</title>

<style>
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
button { -webkit-appearance: none; appearance: none; font: inherit; }

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
  overflow:hidden;

  background-image:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("01.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  transition: background-image .5s ease;

  font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
}

.card{
  width:calc(100% - 32px);
  max-width:420px;
  background:rgba(255,255,255,.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);

  border-radius:20px;
  padding:28px 24px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.25);

  position:fixed;
  left:50%;
  bottom:calc(20px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:10;
}

/* Yes 버튼 누른 뒤 최상단으로 이동 */
.card.is-top{
  top:calc(20px + env(safe-area-inset-top));
  bottom:auto;
}

h1{
  font-size:20px;
  line-height:1.6;
  margin:0 0 24px;
}

.btn-container{
  position:relative;
  width:280px;
  height:56px;
  margin:0 auto;
  touch-action: manipulation; /* ✅ 모바일 탭 반응 개선 */
}

.btn{
  position:absolute;
  top:0;
  width:120px;
  height:48px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  user-select:none;
  z-index:20;            /* ✅ 클릭 안 막히게 */
  pointer-events:auto;   /* ✅ 클릭 안 막히게 */
  transition: transform .15s ease;
}

.btn:active{ transform:scale(.98); }

.yes{ left:0; background:#ff4d6d; color:#fff; }
.no { left:160px; background:#d6d6d6; color:#111; }

.result{
  margin-top:18px;
  font-size:20px;
  font-weight:700;
  color:#ff4d6d;
  display:none;
}

.heart{
  position:fixed;
  pointer-events:none;
  z-index:5;
  font-size:24px;
  animation: float 2.8s ease-out forwards;
  transform: translateX(-50%);
}

@keyframes float{
  0%{
    transform: translateX(-50%) translateY(0) scale(.8) rotate(0deg);
    opacity:0;
  }
  10%{
    opacity:1;
  }
  100%{
    transform:
      translateX(calc(-50% + var(--move-x)))
      translateY(-360px)
      scale(1.3)
      rotate(var(--rotate));
    opacity:0;
  }
}

@media (max-width: 768px) {
  .card{
    width:calc(100% - 28px);
    max-width:360px;
    padding:20px 18px;
    bottom:calc(16px + env(safe-area-inset-bottom));
  }

  .card.is-top{
    top:calc(16px + env(safe-area-inset-top));
    bottom:auto;
  }
}  
</style>
</head>

<body>
  <div class="card">
    <h1>  
      5월 30일에 나랑 데이트 할래?
    </h1>

    <div class="btn-container" id="btnArea">
      <button class="btn yes" id="yesBtn" type="button">Yes</button>
      <button class="btn no" id="noBtn" type="button">No</button>
    </div>

    <div class="result" id="result">❤️ 데이트 확정 쪽 ❤️</div>
  </div>

<script>
(function () {
  const yesBtn = document.getElementById("yesBtn") || document.querySelector(".yes");
  const noBtn  = document.getElementById("noBtn")  || document.querySelector(".no");
  const btnArea = document.getElementById("btnArea") || document.querySelector(".btn-container");
  const result = document.getElementById("result");

  if (!yesBtn || !noBtn || !btnArea) {
    // 요소가 없으면(복붙 실수) 그냥 종료
    return;
  }

  yesBtn.addEventListener("click", () => {
    document.body.style.backgroundImage =
      'linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url("02.jpg")';
      document.querySelector(".card").classList.add("is-top");
    if (result) result.style.display = "block";
    createHearts();
  });

function createHearts(){
  const count = 24;
  const padding = 30;
  const screenW = window.innerWidth;
  const screenH = window.innerHeight;

  for(let i = 0; i < count; i++){
    const h = document.createElement("div");
    h.className = "heart";
    h.textContent = "❤️";

    // 화면 가로를 여러 칸으로 나눠서 겹침 줄이기
    const slotWidth = (screenW - padding * 2) / count;
    const x = padding + slotWidth * i + Math.random() * slotWidth;

    // 시작 높이도 약간씩 다르게
    const y = screenH - 40 + Math.random() * 80;

    // 좌우 흔들림
    const moveX = (Math.random() * 160 - 80) + "px";

    // 회전값
    const rotate = (Math.random() * 60 - 30) + "deg";

    // 크기 조금씩 다르게
    const size = 20 + Math.random() * 14;

    h.style.left = x + "px";
    h.style.top = y + "px";
    h.style.fontSize = size + "px";
    h.style.setProperty("--move-x", moveX);
    h.style.setProperty("--rotate", rotate);

    // 동시에 딱 뜨지 않게 살짝 지연
    h.style.animationDelay = (Math.random() * 0.35) + "s";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 3200);
  }
}

  function moveNo(){
    const w = noBtn.offsetWidth || 120;
    const h = noBtn.offsetHeight || 48;
    const maxX = btnArea.clientWidth - w;
    const maxY = btnArea.clientHeight - h;

    const x = Math.max(0, Math.random()*maxX);
    const y = Math.max(0, Math.random()*maxY);

    noBtn.style.left = x + "px";
    noBtn.style.top  = y + "px";
  }

  // PC: 올리면 도망
  noBtn.addEventListener("mouseenter", moveNo);

  // 모바일: 누르려는 순간 도망
  noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNo();
  }, { passive:false });

  // 클릭도 방지
  noBtn.addEventListener("click", (e) => {
    e.preventDefault();
    moveNo();
  });

})();
</script>
</body>
</html>
